name: Keep Service Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send keepalive POST (curl)
        run: |
          curl -fsS -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-WEBHOOK-SECRET: ${{ secrets.WEBHOOK_SECRET }}" \
            -d '{"note":"github-actions keepalive"}'
