name: Keep Service Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send keepalive POST
        uses: actions/http-client@v2
        with:
          url: ${{ secrets.WEBHOOK_URL }}
          method: POST
          headers: |
            Content-Type: application/json
            X-WEBHOOK-SECRET: ${{ secrets.WEBHOOK_SECRET }}
          body: '{"note":"github-actions keepalive"}'
